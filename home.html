<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylee.css">
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
    rel="stylesheet"/>
    <title>home</title>
</head>
<body>
    <header>
        <h1>Welcome Back 👋</h1>
        <button class="create-btn">
            <i class="ri-add-line"></i> Create Post
        </button>
    </header>

    <!-- Post Form (Hidden by Default) -->
<section class="post-form-section">

    <form class="post-form">
        <input id="title" placeholder="Title here..." type="text">
        <input id="descreption" placeholder="Descreption here..." type="text">


        <div class="form-actions">
            <button type="submit" class="post-btn">
                Post
            </button>
        </div>
    </form>

</section>

    <main class="posts-container">

        <div class="post-card">
            <div class="post-header">
                <h4>John Doe</h4>
                <button class="delete-btn">
                    <i class="ri-delete-bin-line"></i>
                </button>
            </div>
            <p>This is my first post on this mini social blogging app 🚀</p>
        </div>

    </main>
    <script src="home.js"></script>
</body>
</html>
